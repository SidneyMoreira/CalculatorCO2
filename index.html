<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Calculadora de Emissão de CO₂ - Calcule a pegada de carbono das suas viagens">
    <title>🌿 Calculadora de Emissão de CO₂</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <h1 class="header__title">🌿 Calculadora de Emissão de CO₂</h1>
        <p class="header__subtitle">Calcule a pegada de carbono das suas viagens e descubra como reduzir seu impacto ambiental</p>
    </header>

    <main>
        <form id="calculator-form" class="calculator-form">
            <div class="calculator-form__field">
                <label for="origin" class="calculator-form__label">Origem</label>
                <input type="text" id="origin" name="origin" class="calculator-form__input" placeholder="Digite sua cidade de origem" list="cities-list">
            </div>

            <div class="calculator-form__field">
                <label for="destination" class="calculator-form__label">Destino</label>
                <input type="text" id="destination" name="destination" class="calculator-form__input" placeholder="Digite sua cidade de destino" list="cities-list">
            </div>

            <div class="calculator-form__field">
                <label for="distance" class="calculator-form__label">Distância (km)</label>
                <input type="number" id="distance" name="distance" class="calculator-form__input calculator-form__input--readonly" readonly placeholder="0">
                <span class="calculator-form__helper">A distância será preenchida automaticamente</span>
            </div>

            <div class="calculator-form__field calculator-form__field--checkbox">
                <input type="checkbox" id="manual-distance" name="manual-distance" class="calculator-form__checkbox">
                <label for="manual-distance" class="calculator-form__label calculator-form__label--checkbox">Inserir distância manualmente</label>
            </div>

            <fieldset class="calculator-form__transport">
                <legend class="calculator-form__legend">Modo de Transporte</legend>
                <div class="calculator-form__transport-grid">
                    <label class="calculator-form__transport-option">
                        <input type="radio" name="transport" value="bicycle" class="calculator-form__radio">
                        <span class="calculator-form__transport-icon">🚲</span>
                        <span class="calculator-form__transport-text">Bicicleta</span>
                    </label>
                    <label class="calculator-form__transport-option">
                        <input type="radio" name="transport" value="motocycle" class="calculator-form__radio">
                        <span class="calculator-form__transport-icon">🏍️</span>
                        <span class="calculator-form__transport-text">Moto</span>
                    </label>
                    <label class="calculator-form__transport-option">
                        <input type="radio" name="transport" value="gasCar" class="calculator-form__radio" checked>
                        <span class="calculator-form__transport-icon calculator-form__transport-icon--stack"><span>🚗</span></span>
                        <span class="calculator-form__transport-text">Carro Gasolina</span>
                    </label>
                    <label class="calculator-form__transport-option">
                        <input type="radio" name="transport" value="electricCar" class="calculator-form__radio">
                        <span class="calculator-form__transport-icon calculator-form__transport-icon--stack"><span>⚡</span><span>🚗</span></span>
                        <span class="calculator-form__transport-text">Carro Elétrico</span>
                    </label>
                    <label class="calculator-form__transport-option">
                        <input type="radio" name="transport" value="hybridCar" class="calculator-form__radio">
                        <span class="calculator-form__transport-icon calculator-form__transport-icon--stack"><span>🔋</span><span>🚗</span></span>
                        <span class="calculator-form__transport-text">Carro Híbrido</span>
                    </label>
                    <label class="calculator-form__transport-option">
                        <input type="radio" name="transport" value="flexCar" class="calculator-form__radio">
                        <span class="calculator-form__transport-icon calculator-form__transport-icon--stack"><span>🌿</span><span>🚗</span></span>
                        <span class="calculator-form__transport-text">Carro Flex</span>
                    </label>
                    <label class="calculator-form__transport-option">
                        <input type="radio" name="transport" value="bus" class="calculator-form__radio">
                        <span class="calculator-form__transport-icon">🚌</span>
                        <span class="calculator-form__transport-text">Ônibus</span>
                    </label>
                    <label class="calculator-form__transport-option">
                        <input type="radio" name="transport" value="train" class="calculator-form__radio">
                        <span class="calculator-form__transport-icon">🚇</span>
                        <span class="calculator-form__transport-text">Trem/Metrô</span>
                    </label>
                    <label class="calculator-form__transport-option">
                        <input type="radio" name="transport" value="truck" class="calculator-form__radio">
                        <span class="calculator-form__transport-icon">🚚</span>
                        <span class="calculator-form__transport-text">Caminhão</span>
                    </label>
                    <label class="calculator-form__transport-option">
                        <input type="radio" name="transport" value="plane" class="calculator-form__radio">
                        <span class="calculator-form__transport-icon">✈️</span>
                        <span class="calculator-form__transport-text">Avião</span>
                    </label>
                </div>
            </fieldset>

            <button type="submit" class="calculator-form__submit">Calcular Emissão</button>
        </form>

        <section id="results" class="results hidden">
            <div id="results-content" class="results__content"></div>
        </section>

        <section id="comparation" class="comparation hidden">
            <div id="comparison-content" class="comparation__content"></div>
        </section>

        <section id="carbon-credits" class="carbon-credits hidden">
            <div id="carbon-credits-content" class="carbon-credits__content"></div>
        </section>
    </main>

    <footer class="footer">
        <p class="footer__credits">Desenvolvido com ❤️ para Desafio DIO | Projeto Github Copilot do Sidnei</p>
    </footer>

    <datalist id="cities-list"></datalist>

    <script src="js/routes-data.js"></script>
    <script src="js/config.js"></script>
    <script src="js/calculator.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
